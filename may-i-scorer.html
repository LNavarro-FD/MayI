<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>May I — Scorer</title>
<style>
  :root {
    --green-deep: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-bright: #52b788;
    --green-light: #d8f3dc;
    --green-pale: #f0faf3;
    --gold: #c9a84c;
    --gold-light: #fdf3dc;
    --cream: #faf8f2;
    --card-bg: #ffffff;
    --border: #e2e8e4;
    --border-soft: #eef2ee;
    --text-dark: #1a2e22;
    --text-mid: #4a6358;
    --text-muted: #8aa898;
    --red-light: #fdf0f0;
    --red-mid: #c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;padding:1rem}
  .app{max-width:720px;margin:0 auto;padding-bottom:3rem}

  /* Top bar */
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--green-light)}
  .top-bar h1{font-size:22px;font-weight:700;color:var(--green-deep);letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
  .top-bar h1 span.suit{color:var(--gold)}
  .top-bar small{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px}

  /* Nav */
  .nav{display:flex;gap:6px;margin-bottom:1.25rem}
  .nav-btn{padding:7px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-mid);cursor:pointer;transition:all 0.15s}
  .nav-btn.active{background:var(--green-deep);border-color:var(--green-deep);color:#fff;font-weight:500}
  .nav-btn:hover:not(.active){background:var(--green-pale);border-color:var(--green-bright)}

  /* Screens */
  .screen{display:none}.screen.active{display:block}

  /* Cards */
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(26,58,42,0.06)}
  .card h2{font-size:19px;font-weight:700;color:var(--green-deep);margin-bottom:4px}
  .card .sub{font-size:14px;color:var(--text-muted);margin-bottom:1.25rem}

  /* Form */
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
  .field input{width:100%;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--cream);color:var(--text-dark);outline:none;transition:border-color 0.15s}
  .field input:focus{border-color:var(--green-bright);background:#fff}
  .pcount-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
  .pcount-row label{font-size:12px;font-weight:600;color:var(--text-mid);white-space:nowrap;text-transform:uppercase;letter-spacing:0.5px}
  .pcount-row input[type=range]{flex:1;accent-color:var(--green-mid);height:4px}
  .pcount-row span{font-size:20px;font-weight:700;min-width:22px;color:var(--green-deep)}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
  .pitem label{font-size:12px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
  .pitem input{width:100%;height:38px;padding:0 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--cream);color:var(--text-dark);outline:none}
  .pitem input:focus{border-color:var(--green-bright);background:#fff}

  /* Dealer picker */
  .dealer-section{margin-bottom:1.25rem}
  .dealer-section > label{display:block;font-size:12px;font-weight:600;color:var(--text-mid);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
  .dealer-note{font-size:12px;color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0}
  .dealer-opts{display:flex;flex-wrap:wrap;gap:6px}
  .dopt{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text-mid);cursor:pointer;background:var(--card-bg);transition:all 0.15s}
  .dopt:hover{border-color:var(--green-bright);color:var(--green-mid)}
  .dopt.sel{background:var(--green-deep);border-color:var(--green-deep);color:#fff;font-weight:500}

  /* Buttons */
  .btn{width:100%;padding:12px;background:var(--green-deep);border:none;border-radius:10px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-bottom:8px;letter-spacing:0.2px;transition:background 0.15s}
  .btn:hover{background:var(--green-mid)}
  .btn-outline{width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text-mid);cursor:pointer}
  .btn-outline:hover{background:var(--green-pale);border-color:var(--green-bright);color:var(--green-mid)}

  /* Dealer banner */
  .dealer-bar{background:var(--green-deep);border-radius:10px;padding:11px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .dealer-bar .dl{font-size:14px;color:#fff}
  .dealer-bar .dl strong{font-weight:700;color:var(--gold)}
  .dealer-bar .nxt{font-size:12px;color:rgba(255,255,255,0.55);margin-left:auto}

  /* Contract banner */
  .contract-bar{background:var(--gold-light);border:1px solid #e8d49a;border-radius:10px;padding:10px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .contract-bar .rnd{font-size:11px;font-weight:700;color:#8a6a1a;text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap}
  .contract-bar .ct{font-size:14px;font-weight:600;color:#5a4010}
  .contract-bar .badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--gold);color:#fff;font-weight:600;margin-left:auto;white-space:nowrap}

  /* Scoreboard */
  .scoreboard{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;overflow:auto;margin-bottom:1rem;box-shadow:0 1px 4px rgba(26,58,42,0.06)}
  .stbl{width:100%;border-collapse:collapse;min-width:400px}
  .stbl th{font-size:11px;font-weight:700;color:var(--text-muted);padding:9px 10px;text-align:center;border-bottom:2px solid var(--green-light);background:var(--green-pale);text-transform:uppercase;letter-spacing:0.5px}
  .stbl th:first-child{text-align:left;min-width:125px}
  .stbl td{font-size:13px;padding:7px 10px;text-align:center;border-bottom:1px solid var(--border-soft);color:var(--text-dark)}
  .stbl td:first-child{text-align:left}
  .stbl tr:last-child td{border-bottom:none}
  .rl{font-size:12px;font-weight:700;color:var(--green-deep);display:block}
  .rc{font-size:10px;color:var(--text-muted);display:block;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
  .rd{font-size:10px;color:var(--text-mid);display:block;margin-top:1px}
  .rd .star{color:var(--gold)}
  .stbl tr.cur td{background:var(--green-pale)}
  .stbl tr.cur td:first-child{border-left:3px solid var(--green-bright)}
  .stbl tr.tot td{font-weight:700;font-size:13px;background:var(--green-light);border-top:2px solid var(--green-bright)}
  .lh{color:var(--green-mid)!important;font-weight:700!important}
  .lc{color:var(--green-mid)!important;font-weight:700!important}

  /* Score entry */
  .ecard{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(26,58,42,0.06)}
  .ecard h3{font-size:15px;font-weight:700;color:var(--green-deep);margin-bottom:3px}
  .ecard .sub{font-size:13px;color:var(--text-muted);margin-bottom:12px}
  .egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px}
  .ei label{font-size:11px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
  .ei input{width:100%;height:40px;padding:0 10px;border:1px solid var(--border);border-radius:8px;font-size:16px;text-align:center;background:var(--cream);color:var(--text-dark);outline:none;font-weight:600}
  .ei input:focus{border-color:var(--green-bright);background:#fff}
  .brow{display:flex;gap:8px}
  .bsave{flex:1;padding:11px;background:var(--green-deep);border:none;border-radius:10px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:background 0.15s}
  .bsave:hover{background:var(--green-mid)}
  .bclr{flex:1;padding:11px;background:transparent;border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text-mid);cursor:pointer}
  .bclr:hover{background:var(--green-pale)}

  /* Game over */
  .govr{background:var(--green-deep);border-radius:12px;padding:18px;margin-bottom:1rem;text-align:center}
  .govr h3{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
  .govr p{font-size:14px;color:var(--green-bright)}

  /* History */
  .htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
  .htop h2{font-size:20px;font-weight:700;color:var(--green-deep)}
  .stitle{font-size:13px;font-weight:700;color:var(--text-mid);margin-bottom:10px;margin-top:1.5rem;text-transform:uppercase;letter-spacing:0.6px}
  .hofg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
  .hofc{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;box-shadow:0 1px 4px rgba(26,58,42,0.06)}
  .hofc:first-child{border-color:var(--gold);background:var(--gold-light)}
  .hofc .rnk{font-size:16px;margin-bottom:4px}
  .hofc .nm{font-size:13px;font-weight:700;color:var(--green-deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hofc .wn{font-size:28px;font-weight:800;color:var(--green-deep);line-height:1.1}
  .hofc .lb{font-size:11px;color:var(--text-muted)}
  .grec{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px;box-shadow:0 1px 3px rgba(26,58,42,0.05)}
  .grh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .grd{font-size:12px;color:var(--text-muted)}
  .grw{font-size:13px;font-weight:700;color:var(--green-mid)}
  .ptags{display:flex;flex-wrap:wrap;gap:5px}
  .ptag{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--green-pale);color:var(--text-mid);border:1px solid var(--border-soft)}
  .ptag.w{background:var(--green-deep);color:#fff;font-weight:600;border-color:var(--green-deep)}
  .empty{text-align:center;padding:2.5rem;color:var(--text-muted);font-size:14px}
  .ghead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem}
  .ghead h2{font-size:18px;font-weight:700;color:var(--green-deep)}
  .ghead span{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}
  @media(max-width:500px){.pgrid{grid-template-columns:1fr}body{padding:.75rem}}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1><span class="suit">♣</span> May I</h1>
    <small>Card game scorer</small>
  </div>

  <div id="ss" class="screen active">
    <div class="card">
      <h2>New game</h2>
      <p class="sub">Set up players and pick the first dealer</p>
      <div class="field"><label>Game date</label><input type="date" id="gdate"></div>
      <div class="pcount-row">
        <label>Players</label>
        <input type="range" min="2" max="10" value="4" id="pr" oninput="upd(this.value)">
        <span id="cd">4</span>
      </div>
      <div class="pgrid" id="pi"></div>
      <div class="dealer-section">
        <label>First dealer <span class="dealer-note">— rotates clockwise each round</span></label>
        <div class="dealer-opts" id="do"></div>
      </div>
      <button class="btn" onclick="go()">Start game</button>
      <button class="btn-outline" onclick="sh('shist')">View past games</button>
    </div>
  </div>

  <div id="sg" class="screen">
    <div class="nav">
      <button class="nav-btn active" id="ns" onclick="gt('s')">Scoreboard</button>
      <button class="nav-btn" id="nh" onclick="gt('h')">History</button>
    </div>
    <div id="gc"></div>
  </div>

  <div id="shist" class="screen">
    <div class="htop">
      <h2>Game history</h2>
      <button class="btn-outline" style="width:auto;padding:7px 16px" onclick="sh('ss')">New game</button>
    </div>
    <div id="hc"></div>
  </div>
</div>

<script>
const C=["2 sets of 3","1 set of 3 + 1 run of 4","2 sets of 4","1 set of 4 + 1 run of 4","1 set of 3 + 1 run of 5","2 runs of 4","3 sets of 3","1 set of 3 + 1 run of 6","2 sets of 3 + 1 run of 4","1 set of 3 + 1 run of 7","1 set of 5 + 1 run of 5","2 runs of 5"];
let S={players:[],scores:{},cur:1,date:'',active:false,fdIdx:0};
let H=JSON.parse(localStorage.getItem('mayi5')||'[]');
function saveH(){localStorage.setItem('mayi5',JSON.stringify(H));}
const td=()=>new Date().toISOString().split('T')[0];
document.getElementById('gdate').value=td();
let selD=0;

function upd(n){
  document.getElementById('cd').textContent=n;
  const pi=document.getElementById('pi');pi.innerHTML='';
  for(let i=1;i<=n;i++){
    const d=document.createElement('div');d.className='pitem';
    d.innerHTML=`<label>Player ${i}</label><input type="text" id="p${i}" placeholder="Player ${i}" oninput="rdo()">`;
    pi.appendChild(d);
  }
  if(selD>=n)selD=0;
  rdo();
}
upd(4);

function names(){
  const n=parseInt(document.getElementById('pr').value),a=[];
  for(let i=1;i<=n;i++)a.push(document.getElementById('p'+i).value.trim()||`Player ${i}`);
  return a;
}

function rdo(){
  const nm=names(),cont=document.getElementById('do');cont.innerHTML='';
  nm.forEach((n,i)=>{
    const b=document.createElement('button');
    b.className='dopt'+(i===selD?' sel':'');
    b.textContent=n;
    b.onclick=()=>{selD=i;document.querySelectorAll('.dopt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
    cont.appendChild(b);
  });
}

function dlr(r){return S.players[(S.fdIdx+(r-1))%S.players.length];}

function go(){
  const pl=names(),d=document.getElementById('gdate').value||td();
  S={players:pl,scores:{},cur:1,date:d,active:true,fdIdx:selD};
  pl.forEach(p=>{S.scores[p]=Array(12).fill(null);});
  sh('sg');gt('s');
}

function sh(s){
  document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  document.getElementById(s).classList.add('active');
  if(s==='shist')ri(document.getElementById('hc'));
  if(s==='sg')rg();
}

function gt(t){
  document.getElementById('ns').classList.toggle('active',t==='s');
  document.getElementById('nh').classList.toggle('active',t==='h');
  const gc=document.getElementById('gc');
  if(t==='h'){gc.innerHTML='';ri(gc);}else rg();
}

function tots(){const t={};S.players.forEach(p=>{t[p]=S.scores[p].reduce((s,v)=>s+(v||0),0);});return t;}
function lead(){const t=tots();return S.players.reduce((a,b)=>t[a]<=t[b]?a:b);}
function fd(d){if(!d)return '';const[y,m,day]=d.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`;}

function rg(){
  const gc=document.getElementById('gc');
  if(!S.active){gc.innerHTML='<p class="empty">No active game.</p>';return;}
  const T=tots(),ldr=lead(),over=S.cur>12;
  const cd=over?null:dlr(S.cur),nd=(!over&&S.cur<12)?dlr(S.cur+1):null;
  let h='';
  h+=`<div class="ghead"><h2>${fd(S.date)||'Current game'}</h2><span>${S.players.length} players</span></div>`;
  if(over){
    h+=`<div class="govr"><h3>🏆 ${ldr} wins!</h3><p>Lowest score: ${T[ldr]} points</p></div>`;
  } else {
    h+=`<div class="dealer-bar"><span style="font-size:18px">🃏</span><span class="dl">Dealer: <strong>${cd}</strong></span>${nd?`<span class="nxt">Next: ${nd}</span>`:''}</div>`;
    h+=`<div class="contract-bar"><span class="rnd">Deal ${S.cur} of 12</span><span class="ct">${C[S.cur-1]}</span><span class="badge">Initial meld</span></div>`;
  }
  h+=`<div class="scoreboard"><table class="stbl"><thead><tr><th>Round</th>`;
  S.players.forEach(p=>{const l=p===ldr&&!over;h+=`<th class="${l?'lh':''}">${p}${l?' ↓':''}</th>`;});
  h+=`</tr></thead><tbody>`;
  for(let r=1;r<=12;r++){
    const ic=r===S.cur&&!over,dl=dlr(r),f=r===1;
    h+=`<tr class="${ic?'cur':''}"><td>
      <span class="rl">Deal ${r}</span>
      <span class="rc">${C[r-1]}</span>
      <span class="rd">${f?'<span class="star">★</span> ':''}${dl}</span>
    </td>`;
    S.players.forEach(p=>{const v=S.scores[p][r-1];h+=`<td>${v===null?'':v}</td>`;});
    h+=`</tr>`;
  }
  h+=`<tr class="tot"><td><span class="rl">Total</span></td>`;
  S.players.forEach(p=>{const w=over&&p===ldr;h+=`<td class="${w?'lc':''}">${T[p]}${w?' 🏆':''}</td>`;});
  h+=`</tr></tbody></table></div>`;
  if(!over){
    h+=`<div class="ecard"><h3>Enter deal ${S.cur} scores</h3><p class="sub">Penalty points remaining in each hand</p><div class="egrid">`;
    S.players.forEach(p=>{const k='e_'+p.replace(/\W/g,'_');h+=`<div class="ei"><label>${p}</label><input type="number" id="${k}" min="0" placeholder="0"></div>`;});
    h+=`</div><div class="brow"><button class="bclr" onclick="rg()">Clear</button><button class="bsave" onclick="sub()">Save deal ${S.cur}</button></div></div>`;
  } else {
    h+=`<button class="btn" onclick="sav()" style="margin-top:1rem">Save game to history</button>`;
  }
  gc.innerHTML=h;
}

function sub(){
  const r=S.cur;
  S.players.forEach(p=>{const k='e_'+p.replace(/\W/g,'_');const el=document.getElementById(k);S.scores[p][r-1]=parseInt(el?el.value:'0')||0;});
  S.cur++;rg();
}

function sav(){
  const T=tots(),w=lead();
  H.unshift({date:S.date,players:S.players.map(p=>({name:p,total:T[p]})),winner:w,firstDealer:S.players[S.fdIdx],scores:JSON.parse(JSON.stringify(S.scores))});
  saveH();S.active=false;sh('shist');
}

function ri(cont){
  const wc={};H.forEach(g=>{wc[g.winner]=(wc[g.winner]||0)+1;});
  const sk=Object.entries(wc).sort((a,b)=>b[1]-a[1]);
  const md=['🥇','🥈','🥉'];
  let h='';
  if(sk.length>0){
    h+=`<div class="stitle">Hall of fame</div><div class="hofg">`;
    sk.forEach(([n,w],i)=>{h+=`<div class="hofc"><div class="rnk">${md[i]||'#'+(i+1)}</div><div class="nm">${n}</div><div class="wn">${w}</div><div class="lb">${w===1?'win':'wins'}</div></div>`;});
    h+=`</div>`;
  }
  if(H.length===0){h+=`<div class="empty">No games yet — play your first game!</div>`;}
  else{
    h+=`<div class="stitle">Past games</div>`;
    H.forEach(g=>{
      const ps=[...g.players].sort((a,b)=>a.total-b.total);
      h+=`<div class="grec"><div class="grh"><span class="grd">${fd(g.date)}${g.firstDealer?' · First dealer: '+g.firstDealer:''}</span><span class="grw">🏆 ${g.winner}</span></div><div class="ptags">`;
      ps.forEach(p=>{h+=`<span class="ptag ${p.name===g.winner?'w':''}">${p.name}: ${p.total}</span>`;});
      h+=`</div></div>`;
    });
  }
  if(!S.active)h+=`<button class="btn" style="max-width:480px;margin-top:1rem" onclick="sh('ss')">New game</button>`;
  cont.innerHTML=h;
}
</script>
</body>
</html>
