<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>May I — Scorer</title>
<style>
  :root {
    --sapphire:       #1a237e;
    --sapphire-mid:   #283593;
    --sapphire-soft:  #3949ab;
    --sapphire-pale:  #e8eaf6;
    --ruby:           #880e4f;
    --ruby-mid:       #ad1457;
    --ruby-light:     #fce4ec;
    --emerald:        #1b5e20;
    --emerald-mid:    #2e7d32;
    --emerald-light:  #e8f5e9;
    --amethyst:       #4a148c;
    --amethyst-mid:   #6a1b9a;
    --amethyst-light: #f3e5f5;
    --gold:           #f9a825;
    --gold-light:     #fff8e1;
    --cream:          #fafafa;
    --card-bg:        #ffffff;
    --border:         #e0e0e0;
    --border-soft:    #f0f0f0;
    --text-dark:      #1a1a2e;
    --text-mid:       #455a64;
    --text-muted:     #90a4ae;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;padding:1rem}
  .app{max-width:760px;margin:0 auto;padding-bottom:3rem}

  .top-bar{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--sapphire) 0%,var(--amethyst) 100%);margin:-1rem -1rem 1.5rem;padding:1rem 1.25rem;border-radius:0 0 16px 16px}
  .top-bar h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
  .top-bar h1 .suit{color:var(--gold)}
  .top-bar-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .top-bar small{font-size:11px;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:1px}
  .sync-status{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600}
  .sync-status.online{background:rgba(46,125,50,0.7);color:#fff}
  .sync-status.offline{background:rgba(136,14,79,0.7);color:#fff}
  .sync-status.syncing{background:rgba(249,168,37,0.7);color:#fff}

  .nav{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
  .nav-btn{padding:7px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-mid);cursor:pointer;transition:all 0.15s}
  .nav-btn.active{background:var(--sapphire);border-color:var(--sapphire);color:#fff;font-weight:600}
  .nav-btn:hover:not(.active){background:var(--sapphire-pale);border-color:var(--sapphire-soft);color:var(--sapphire)}

  .screen{display:none}.screen.active{display:block}

  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(26,35,126,0.07)}
  .card h2{font-size:19px;font-weight:700;color:var(--sapphire);margin-bottom:4px}
  .card .sub{font-size:14px;color:var(--text-muted);margin-bottom:1.25rem}

  .field{margin-bottom:1rem}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.6px}
  .field input,.field select{width:100%;height:40px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:#fff;color:var(--text-dark);outline:none;transition:border-color 0.15s}
  .field input:focus,.field select:focus{border-color:var(--sapphire-soft)}
  .pcount-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
  .pcount-row label{font-size:11px;font-weight:700;color:var(--text-mid);white-space:nowrap;text-transform:uppercase;letter-spacing:0.6px}
  .pcount-row input[type=range]{flex:1;accent-color:var(--sapphire)}
  .pcount-row span{font-size:20px;font-weight:800;min-width:22px;color:var(--sapphire)}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem}
  .pitem label{font-size:11px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
  .pitem input{width:100%;height:38px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text-dark);outline:none}
  .pitem input:focus{border-color:var(--sapphire-soft)}

  .dealer-section{margin-bottom:1.25rem}
  .dealer-section > label{display:block;font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.6px}
  .dealer-note{font-size:12px;color:var(--text-muted);font-weight:400;text-transform:none;letter-spacing:0}
  .dealer-opts{display:flex;flex-wrap:wrap;gap:6px}
  .dopt{padding:6px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;color:var(--text-mid);cursor:pointer;background:#fff;transition:all 0.15s}
  .dopt:hover{border-color:var(--sapphire-soft);color:var(--sapphire)}
  .dopt.sel{background:var(--sapphire);border-color:var(--sapphire);color:#fff;font-weight:600}

  /* Game code join */
  .join-section{background:var(--sapphire-pale);border:1.5px solid #9fa8da;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
  .join-section .js-title{font-size:11px;font-weight:700;color:var(--sapphire);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px}
  .join-row{display:flex;gap:8px}
  .join-row input{flex:1;height:38px;padding:0 12px;border:1.5px solid #9fa8da;border-radius:8px;font-size:14px;background:#fff;color:var(--text-dark);outline:none;text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .join-row input:focus{border-color:var(--sapphire)}
  .join-row button{padding:0 16px;height:38px;background:var(--sapphire);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}

  /* Challenge section */
  .challenge-section{background:var(--amethyst-light);border:1.5px solid #ce93d8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem}
  .challenge-section > .cs-title{font-size:11px;font-weight:700;color:var(--amethyst);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px}
  .challenge-opts{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .copt{padding:5px 13px;border:1.5px solid #ce93d8;border-radius:20px;font-size:13px;color:var(--amethyst-mid);cursor:pointer;background:#fff;transition:all 0.15s}
  .copt:hover{background:var(--amethyst-light)}
  .copt.sel{background:var(--amethyst);border-color:var(--amethyst);color:#fff;font-weight:600}
  .new-challenge-row{display:flex;gap:8px;margin-top:8px}
  .new-challenge-row input{flex:1;height:36px;padding:0 10px;border:1.5px solid #ce93d8;border-radius:8px;font-size:13px;background:#fff;color:var(--text-dark);outline:none}
  .new-challenge-row input:focus{border-color:var(--amethyst)}
  .new-challenge-row button{padding:0 14px;height:36px;background:var(--amethyst);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  .no-challenge{font-size:12px;color:var(--text-muted);font-style:italic}

  .btn{width:100%;padding:12px;background:var(--sapphire);border:none;border-radius:10px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-bottom:8px;letter-spacing:0.2px;transition:background 0.15s}
  .btn:hover{background:var(--sapphire-soft)}
  .btn-outline{width:100%;padding:11px;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text-mid);cursor:pointer;transition:all 0.15s}
  .btn-outline:hover{background:var(--sapphire-pale);border-color:var(--sapphire-soft);color:var(--sapphire)}

  /* Game code display */
  .game-code-bar{background:var(--sapphire-pale);border:1.5px solid #9fa8da;border-radius:10px;padding:10px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .game-code-bar .gc-label{font-size:11px;font-weight:700;color:var(--sapphire);text-transform:uppercase;letter-spacing:0.5px}
  .game-code-bar .gc-code{font-size:20px;font-weight:800;color:var(--sapphire);letter-spacing:4px}
  .game-code-bar .gc-hint{font-size:11px;color:var(--text-muted);margin-left:auto}

  .dealer-bar{background:linear-gradient(135deg,var(--sapphire),var(--amethyst));border-radius:10px;padding:11px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .dealer-bar .dl{font-size:14px;color:#fff}
  .dealer-bar .dl strong{font-weight:700;color:var(--gold)}
  .dealer-bar .nxt{font-size:12px;color:rgba(255,255,255,0.55);margin-left:auto}

  .challenge-pill{display:inline-flex;align-items:center;gap:6px;background:var(--amethyst);color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:10px}

  .contract-bar{background:var(--gold-light);border:1.5px solid #ffe082;border-radius:10px;padding:10px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .contract-bar .rnd{font-size:11px;font-weight:700;color:#8a6a1a;text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap}
  .contract-bar .ct{font-size:14px;font-weight:600;color:#5a4010}
  .contract-bar .badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--gold);color:#fff;font-weight:700;margin-left:auto;white-space:nowrap}

  .scoreboard{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;overflow:auto;margin-bottom:1rem;box-shadow:0 2px 8px rgba(26,35,126,0.07)}
  .stbl{width:100%;border-collapse:collapse;min-width:400px}
  .stbl th{font-size:11px;font-weight:700;color:var(--text-muted);padding:9px 10px;text-align:center;border-bottom:2px solid var(--sapphire-pale);background:var(--sapphire-pale);text-transform:uppercase;letter-spacing:0.5px}
  .stbl th:first-child{text-align:left;min-width:160px}
  .stbl td{font-size:13px;padding:7px 10px;text-align:center;border-bottom:1px solid var(--border-soft);color:var(--text-dark)}
  .stbl td:first-child{text-align:left}
  .stbl tr:last-child td{border-bottom:none}
  .rl{font-size:12px;font-weight:700;color:var(--sapphire);display:block}
  .rc{font-size:10px;color:var(--text-muted);display:block;margin-top:1px;white-space:normal;line-height:1.3}
  .rd{font-size:10px;color:var(--text-mid);display:block;margin-top:1px}
  .rd .star{color:var(--gold)}
  .stbl tr.cur td{background:var(--sapphire-pale)}
  .stbl tr.cur td:first-child{border-left:3px solid var(--sapphire-soft)}
  .stbl tr.tot td{font-weight:700;font-size:13px;background:linear-gradient(90deg,var(--sapphire-pale),#fff);border-top:2px solid var(--sapphire-soft)}
  .lh{color:var(--emerald-mid)!important;font-weight:700!important}
  .lc{color:var(--emerald-mid)!important;font-weight:700!important}

  .ecard{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(26,35,126,0.07)}
  .ecard h3{font-size:15px;font-weight:700;color:var(--sapphire);margin-bottom:3px}
  .ecard .sub{font-size:13px;color:var(--text-muted);margin-bottom:12px}
  .egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px}
  .ei label{font-size:11px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
  .ei input{width:100%;height:40px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;text-align:center;background:#fff;color:var(--text-dark);outline:none;font-weight:600}
  .ei input:focus{border-color:var(--sapphire-soft)}
  .brow{display:flex;gap:8px}
  .bsave{flex:1;padding:11px;background:var(--sapphire);border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff;cursor:pointer}
  .bsave:hover{background:var(--sapphire-soft)}
  .bclr{flex:1;padding:11px;background:transparent;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text-mid);cursor:pointer}
  .bclr:hover{background:var(--sapphire-pale)}

  .govr{background:linear-gradient(135deg,var(--sapphire),var(--amethyst));border-radius:14px;padding:20px;margin-bottom:1rem;text-align:center}
  .govr h3{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px}
  .govr p{font-size:14px;color:rgba(255,255,255,0.75)}

  .htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
  .htop h2{font-size:20px;font-weight:800;color:var(--sapphire)}
  .stitle{font-size:11px;font-weight:700;color:var(--text-mid);margin-bottom:10px;margin-top:1.5rem;text-transform:uppercase;letter-spacing:0.7px}
  .hofg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
  .hofc{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;box-shadow:0 2px 6px rgba(26,35,126,0.07)}
  .hofc:first-child{border-color:var(--gold);background:var(--gold-light)}
  .hofc .rnk{font-size:18px;margin-bottom:4px}
  .hofc .nm{font-size:13px;font-weight:700;color:var(--sapphire);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hofc .wn{font-size:28px;font-weight:800;color:var(--sapphire);line-height:1.1}
  .hofc .lb{font-size:11px;color:var(--text-muted)}
  .grec{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px;box-shadow:0 1px 4px rgba(26,35,126,0.05)}
  .grh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px}
  .grd{font-size:12px;color:var(--text-muted)}
  .grw{font-size:13px;font-weight:700;color:var(--emerald-mid)}
  .ptags{display:flex;flex-wrap:wrap;gap:5px}
  .ptag{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--sapphire-pale);color:var(--sapphire);border:1px solid #c5cae9}
  .ptag.w{background:var(--emerald-mid);color:#fff;font-weight:600;border-color:var(--emerald-mid)}
  .empty{text-align:center;padding:2.5rem;color:var(--text-muted);font-size:14px}
  .ghead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:6px}
  .ghead h2{font-size:18px;font-weight:700;color:var(--sapphire)}
  .ghead span{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px}

  .challenge-card{background:var(--card-bg);border:1.5px solid #ce93d8;border-radius:14px;padding:1.25rem;margin-bottom:10px;box-shadow:0 2px 8px rgba(74,20,140,0.08)}
  .challenge-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
  .challenge-name{font-size:16px;font-weight:700;color:var(--amethyst);display:flex;align-items:center;gap:6px}
  .challenge-dates{font-size:12px;color:var(--text-muted)}
  .challenge-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--amethyst);color:#fff}
  .challenge-status.closed{background:var(--text-muted)}
  .c-leaderboard{width:100%;border-collapse:collapse;margin-top:8px}
  .c-leaderboard th{font-size:11px;font-weight:700;color:var(--text-muted);padding:6px 8px;text-align:left;border-bottom:1.5px solid var(--amethyst-light);text-transform:uppercase;letter-spacing:0.4px}
  .c-leaderboard th:last-child{text-align:center}
  .c-leaderboard td{font-size:13px;padding:6px 8px;border-bottom:1px solid var(--border-soft);color:var(--text-dark)}
  .c-leaderboard td:last-child{text-align:center;font-weight:700}
  .c-leaderboard tr:last-child td{border-bottom:none}
  .c-leaderboard tr.c-leader td{color:var(--amethyst);font-weight:700}
  .c-leaderboard tr.c-leader td:first-child::before{content:'💎 '}
  .btn-close-challenge{padding:7px 14px;background:var(--ruby);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px}
  .btn-close-challenge:hover{background:var(--ruby-mid)}

  .loading{text-align:center;padding:2rem;color:var(--text-muted);font-size:14px}
  .btn-abandon{padding:6px 12px;background:var(--ruby);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;margin-left:auto}
  .btn-abandon:hover{background:var(--ruby-mid)}

  @media(max-width:500px){.pgrid{grid-template-columns:1fr}body{padding:.75rem}}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <h1><span class="suit">♦</span> May I</h1>
    <div class="top-bar-right">
      <small>Card game scorer · v1.1</small>
      <span class="sync-status syncing" id="sync-status">Connecting...</span>
    </div>
  </div>

  <!-- Setup -->
  <div id="ss" class="screen active">
    <div class="card">
      <h2>New game</h2>
      <p class="sub">Set up players and pick the first dealer</p>
      <div class="field"><label>Game date</label><input type="date" id="gdate"></div>
      <div class="pcount-row">
        <label>Players</label>
        <input type="range" min="2" max="10" value="4" id="pr" oninput="upd(this.value)">
        <span id="cd">4</span>
      </div>
      <div class="pgrid" id="pi"></div>
      <div class="dealer-section">
        <label>First dealer <span class="dealer-note">— rotates clockwise each round</span></label>
        <div class="dealer-opts" id="do"></div>
      </div>
      <div class="challenge-section">
        <div class="cs-title">💎 Add to a challenge <span style="font-weight:400;color:var(--amethyst-mid);text-transform:none;letter-spacing:0">(optional)</span></div>
        <div class="challenge-opts" id="co"></div>
        <div class="new-challenge-row">
          <input type="text" id="new-c-name" placeholder="New challenge e.g. India Challenge">
          <button onclick="addChallenge()">+ Create</button>
        </div>
      </div>
      <button class="btn" onclick="go()">Start game</button>
      <button class="btn-outline" onclick="sh('shist')">Past games &amp; challenges</button>
    </div>

    <div class="card">
      <h2>Join a game</h2>
      <p class="sub">Enter a game code to follow along on this device</p>
      <div class="join-section">
        <div class="js-title">Enter game code</div>
        <div class="join-row">
          <input type="text" id="join-code" maxlength="6" placeholder="ABC123">
          <button onclick="joinGame()">Join</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div id="sg" class="screen">
    <div class="nav">
      <button class="nav-btn active" id="ns" onclick="gt('s')">Scoreboard</button>
      <button class="nav-btn" id="nh" onclick="gt('h')">History</button>
      <button class="nav-btn" id="nc" onclick="gt('c')">Challenges</button>
    </div>
    <div id="gc"></div>
  </div>

  <!-- History -->
  <div id="shist" class="screen">
    <div class="htop">
      <h2>History &amp; Challenges</h2>
      <button class="btn-outline" style="width:auto;padding:7px 16px" onclick="sh('ss')">New game</button>
    </div>
    <div id="hc"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDa8F5R2ZPHDFpH-56W5KlqiISKIrWNsEs",
  authDomain: "may-i-scorer.firebaseapp.com",
  databaseURL: "https://may-i-scorer-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "may-i-scorer",
  storageBucket: "may-i-scorer.firebasestorage.app",
  messagingSenderId: "757894408849",
  appId: "1:757894408849:web:3dc6dd57b15170e17ead30"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const C=["2 sets of 3","1 set of 3 + 1 run of 4","2 sets of 4","1 set of 4 + 1 run of 4","1 set of 3 + 1 run of 5","2 runs of 4","3 sets of 3","1 set of 3 + 1 run of 6","2 sets of 3 + 1 run of 4","1 set of 3 + 1 run of 7","1 set of 5 + 1 run of 5","2 runs of 5"];

let S={players:[],scores:{},cur:1,date:'',active:false,fdIdx:0,challengeId:null,gameCode:null};
let H=[];
let challenges=[];
let selD=0,selC=null;
let isHost=false;
let unsubGame=null;

// Sync status
function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  el.className='sync-status '+s;
  el.textContent=s==='online'?'Synced':s==='syncing'?'Syncing...':'Offline';
}

// Load all games and challenges from Firebase
async function loadAll(){
  setSyncStatus('syncing');
  try{
    const [gSnap,cSnap]=await Promise.all([get(ref(db,'games')),get(ref(db,'challenges'))]);
    H=[];
    if(gSnap.exists()){
      const data=gSnap.val();
      Object.values(data).forEach(g=>{H.push(g);});
      H.sort((a,b)=>b.date.localeCompare(a.date));
    }
    challenges=[];
    if(cSnap.exists()){
      const data=cSnap.val();
      Object.entries(data).forEach(([id,c])=>{challenges.push({...c,id});});
    }
    setSyncStatus('online');
    renderChallengeOpts();
  }catch(e){
    setSyncStatus('offline');
    console.error(e);
  }
}
loadAll();

function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='';
  for(let i=0;i<6;i++)code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

const td=()=>new Date().toISOString().split('T')[0];
document.getElementById('gdate').value=td();

function upd(n){
  document.getElementById('cd').textContent=n;
  const pi=document.getElementById('pi');pi.innerHTML='';
  for(let i=1;i<=n;i++){
    const d=document.createElement('div');d.className='pitem';
    d.innerHTML=`<label>Player ${i}</label><input type="text" id="p${i}" placeholder="Player ${i}" oninput="rdo()">`;
    pi.appendChild(d);
  }
  if(selD>=n)selD=0;
  rdo();
}
upd(4);
window.upd=upd;

function names(){
  const n=parseInt(document.getElementById('pr').value),a=[];
  for(let i=1;i<=n;i++)a.push(document.getElementById('p'+i).value.trim()||`Player ${i}`);
  return a;
}

function rdo(){
  const nm=names(),cont=document.getElementById('do');cont.innerHTML='';
  nm.forEach((n,i)=>{
    const b=document.createElement('button');
    b.className='dopt'+(i===selD?' sel':'');
    b.textContent=n;
    b.onclick=()=>{selD=i;document.querySelectorAll('.dopt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
    cont.appendChild(b);
  });
}
window.rdo=rdo;

function renderChallengeOpts(){
  const cont=document.getElementById('co');if(!cont)return;cont.innerHTML='';
  const active=challenges.filter(c=>!c.closed);
  if(active.length===0){cont.innerHTML='<span class="no-challenge">No active challenges — create one below</span>';return;}
  const none=document.createElement('button');
  none.className='copt'+(selC===null?' sel':'');none.textContent='None';
  none.onclick=()=>{selC=null;document.querySelectorAll('.copt').forEach(x=>x.classList.remove('sel'));none.classList.add('sel');};
  cont.appendChild(none);
  active.forEach(ch=>{
    const b=document.createElement('button');
    b.className='copt'+(selC===ch.id?' sel':'');b.textContent=ch.name;
    b.onclick=()=>{selC=ch.id;document.querySelectorAll('.copt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
    cont.appendChild(b);
  });
}

window.addChallenge=async function(){
  const inp=document.getElementById('new-c-name');
  const name=inp.value.trim();if(!name)return;
  setSyncStatus('syncing');
  const chRef=push(ref(db,'challenges'));
  const ch={name,created:td(),closed:false,games:[]};
  await set(chRef,ch);
  challenges.push({...ch,id:chRef.key});
  selC=chRef.key;
  inp.value='';
  setSyncStatus('online');
  renderChallengeOpts();
};

function dlr(r){return S.players[(S.fdIdx+(r-1))%S.players.length];}

window.go=async function(){
  const pl=names(),d=document.getElementById('gdate').value||td();
  const code=genCode();
  S={players:pl,scores:{},cur:1,date:d,active:true,fdIdx:selD,challengeId:selC,gameCode:code};
  pl.forEach(p=>{S.scores[p]=Array(12).fill(null);});
  isHost=true;
  setSyncStatus('syncing');
  await set(ref(db,'live/'+code),{...S,lastUpdated:Date.now()});
  setSyncStatus('online');
  subscribeToGame(code);
  sh('sg');gt('s');
};

window.joinGame=async function(){
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!code||code.length<4)return;
  setSyncStatus('syncing');
  try{
    const snap=await get(ref(db,'live/'+code));
    if(!snap.exists()){alert('Game not found. Check the code and try again.');setSyncStatus('online');return;}
    S={...snap.val(),gameCode:code};
    isHost=false;
    subscribeToGame(code);
    sh('sg');gt('s');
    setSyncStatus('online');
  }catch(e){setSyncStatus('offline');alert('Could not connect. Check your internet and try again.');}
};

function subscribeToGame(code){
  if(unsubGame)unsubGame();
  unsubGame=onValue(ref(db,'live/'+code),(snap)=>{
    if(!snap.exists())return;
    const data=snap.val();
    S={...data,gameCode:code};
    const gc=document.getElementById('gc');
    if(gc&&document.getElementById('sg').classList.contains('active')){
      const activeTab=document.getElementById('ns').classList.contains('active')?'s':
                      document.getElementById('nh').classList.contains('active')?'h':'c';
      if(activeTab==='s')rg();
    }
    setSyncStatus('online');
  });
}

async function pushGameState(){
  if(!S.gameCode)return;
  setSyncStatus('syncing');
  await set(ref(db,'live/'+S.gameCode),{...S,lastUpdated:Date.now()});
  setSyncStatus('online');
}

function sh(s){
  document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  document.getElementById(s).classList.add('active');
  if(s==='shist'){loadAll().then(()=>ri(document.getElementById('hc')));}
  if(s==='sg')rg();
}
window.sh=sh;

function gt(t){
  ['s','h','c'].forEach(x=>document.getElementById('n'+x).classList.toggle('active',t===x));
  const gc=document.getElementById('gc');
  if(t==='h'){gc.innerHTML='';loadAll().then(()=>ri(gc));}
  else if(t==='c'){gc.innerHTML='';loadAll().then(()=>renderChallengesInto(gc));}
  else rg();
}
window.gt=gt;

function tots(){const t={};S.players.forEach(p=>{t[p]=S.scores[p].reduce((s,v)=>s+(v||0),0);});return t;}
function lead(){const t=tots();return S.players.reduce((a,b)=>t[a]<=t[b]?a:b);}
function fd(d){if(!d)return '';const[y,m,day]=d.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return `${parseInt(day)} ${mo[parseInt(m)-1]} ${y}`;}

function rg(){
  const gc=document.getElementById('gc');
  if(!S.active){gc.innerHTML='<p class="empty">No active game.</p>';return;}
  const T=tots(),ldr=lead(),over=S.cur>12;
  const cd=over?null:dlr(S.cur),nd=(!over&&S.cur<12)?dlr(S.cur+1):null;
  let h='';
  h+=`<div class="ghead"><h2>${fd(S.date)||'Current game'}</h2><span>${S.players.length} players</span></div>`;

  // Game code bar
  if(S.gameCode&&isHost){
    h+=`<div class="game-code-bar">
      <div><span class="gc-label">Game code</span><span class="gc-code" style="display:block">${S.gameCode}</span><span class="gc-hint">Share this code so others can follow live</span></div>
      <button onclick="abandonGame()" class="btn-abandon">Abandon game</button>
    </div>`;
  } else if(S.gameCode&&!isHost){
    h+=`<div class="game-code-bar"><span class="gc-label">Viewing live</span><span class="gc-hint" style="flex:1">Following game <strong>${S.gameCode}</strong></span><button onclick="leaveGame()" class="btn-abandon">Leave game</button></div>`;
  }

  if(S.challengeId){
    const ch=challenges.find(c=>c.id===S.challengeId);
    if(ch)h+=`<div style="margin-bottom:8px"><span class="challenge-pill">💎 ${ch.name}</span></div>`;
  }

  if(over){
    h+=`<div class="govr"><h3>🏆 ${ldr} wins!</h3><p>Lowest score: ${T[ldr]} points</p></div>`;
  } else {
    h+=`<div class="dealer-bar"><span style="font-size:18px">🃏</span><span class="dl">Dealer: <strong>${cd}</strong></span>${nd?`<span class="nxt">Next: ${nd}</span>`:''}</div>`;
    h+=`<div class="contract-bar"><span class="rnd">Deal ${S.cur} of 12</span><span class="ct">${C[S.cur-1]}</span><span class="badge">Contract</span></div>`;
  }

  h+=`<div class="scoreboard"><table class="stbl"><thead><tr><th>Round</th>`;
  S.players.forEach(p=>{const l=p===ldr&&!over;h+=`<th class="${l?'lh':''}">${p}${l?' ↓':''}</th>`;});
  h+=`</tr></thead><tbody>`;
  for(let r=1;r<=12;r++){
    const ic=r===S.cur&&!over,dl=dlr(r),f=r===1;
    h+=`<tr class="${ic?'cur':''}"><td>
      <span class="rl">Deal ${r}</span>
      <span class="rc">${C[r-1]}</span>
      <span class="rd">${f?'<span class="star">★</span> ':''}${dl}</span>
    </td>`;
    S.players.forEach(p=>{const v=S.scores[p][r-1];h+=`<td>${v===null?'':v}</td>`;});
    h+=`</tr>`;
  }
  h+=`<tr class="tot"><td><span class="rl">Total</span></td>`;
  S.players.forEach(p=>{const w=over&&p===ldr;h+=`<td class="${w?'lc':''}">${T[p]}${w?' 🏆':''}</td>`;});
  h+=`</tr></tbody></table></div>`;

  if(!over&&isHost){
    h+=`<div class="ecard"><h3>Enter deal ${S.cur} scores</h3><p class="sub">Penalty points remaining in each hand</p><div class="egrid">`;
    S.players.forEach(p=>{const k='e_'+p.replace(/\W/g,'_');h+=`<div class="ei"><label>${p}</label><input type="number" id="${k}" min="0" placeholder="0"></div>`;});
    h+=`</div><div class="brow"><button class="bclr" onclick="rg()">Clear</button><button class="bsave" onclick="sub()">Save deal ${S.cur}</button></div></div>`;
  } else if(!over&&!isHost){
    h+=`<div style="text-align:center;padding:1rem;color:var(--text-muted);font-size:13px">Viewing live — scores are entered on the host device</div>`;
  }

  if(over&&isHost){
    h+=`<button class="btn" onclick="sav()" style="margin-top:1rem">Save game to history</button>`;
  }
  gc.innerHTML=h;
}

window.sub=async function(){
  const r=S.cur;
  S.players.forEach(p=>{const k='e_'+p.replace(/\W/g,'_');const el=document.getElementById(k);S.scores[p][r-1]=parseInt(el?el.value:'0')||0;});
  S.cur++;
  await pushGameState();
  rg();
};

window.sav=async function(){
  const T=tots(),w=lead();
  const rec={date:S.date,players:S.players.map(p=>({name:p,total:T[p]})),winner:w,firstDealer:S.players[S.fdIdx],challengeId:S.challengeId||null,scores:S.scores};
  setSyncStatus('syncing');
  const gameRef=push(ref(db,'games'));
  await set(gameRef,rec);
  if(S.challengeId){
    const ch=challenges.find(c=>c.id===S.challengeId);
    if(ch){
      const games=ch.games||[];
      games.push({date:S.date,winner:w,players:S.players});
      await update(ref(db,'challenges/'+S.challengeId),{games});
    }
  }
  setSyncStatus('online');
  S.active=false;
  await loadAll();
  sh('shist');
};

function getChallengeLeaderboard(ch){
  const wc={};
  const games=ch.games||[];
  games.forEach(g=>{wc[g.winner]=(wc[g.winner]||0)+1;});
  if(games.length>0)games[0].players.forEach(p=>{if(!wc[p])wc[p]=0;});
  return Object.entries(wc).sort((a,b)=>b[1]-a[1]);
}

function renderChallengesInto(cont){
  const active=challenges.filter(c=>!c.closed);
  const closed=challenges.filter(c=>c.closed);
  let h='';
  if(challenges.length===0){h='<div class="empty">No challenges yet — create one when starting a game!</div>';}
  else{
    if(active.length>0){h+=`<div class="stitle">Active challenges</div>`;active.forEach(ch=>{h+=renderChallenge(ch,true);});}
    if(closed.length>0){h+=`<div class="stitle">Completed challenges</div>`;closed.forEach(ch=>{h+=renderChallenge(ch,false);});}
  }
  cont.innerHTML=h;
}

function renderChallenge(ch,showClose){
  const lb=getChallengeLeaderboard(ch);
  const top=lb.length>0?lb[0][0]:null;
  const games=ch.games||[];
  let h=`<div class="challenge-card">
    <div class="challenge-card-header">
      <span class="challenge-name">💎 ${ch.name}</span>
      <span class="challenge-status ${ch.closed?'closed':''}">${ch.closed?'Completed':'Active'}</span>
    </div>
    <div class="challenge-dates">Started ${fd(ch.created)}${ch.closed?' · Ended '+fd(ch.closedDate):''} · ${games.length} game${games.length===1?'':'s'}</div>`;
  if(lb.length>0){
    h+=`<table class="c-leaderboard"><thead><tr><th>Player</th><th>Wins</th></tr></thead><tbody>`;
    lb.forEach(([name,wins])=>{h+=`<tr class="${name===top&&!ch.closed?'c-leader':''}"><td>${name}</td><td>${wins}</td></tr>`;});
    h+=`</tbody></table>`;
  } else {h+=`<p style="font-size:13px;color:var(--text-muted);margin-top:8px">No games played yet</p>`;}
  if(showClose&&games.length>0)h+=`<button class="btn-close-challenge" onclick="closeChallenge('${ch.id}')">Close challenge</button>`;
  h+=`</div>`;return h;
}

window.closeChallenge=async function(id){
  await update(ref(db,'challenges/'+id),{closed:true,closedDate:td()});
  await loadAll();
  const gc=document.getElementById('gc');if(gc)renderChallengesInto(gc);
  const hc=document.getElementById('hc');if(hc)ri(hc);
};

function ri(cont){
  const wc={};H.forEach(g=>{wc[g.winner]=(wc[g.winner]||0)+1;});
  const sk=Object.entries(wc).sort((a,b)=>b[1]-a[1]);
  const md=['🥇','🥈','🥉'];
  let h='';
  const allCh=[...challenges.filter(c=>!c.closed),...challenges.filter(c=>c.closed)];
  if(allCh.length>0){h+=`<div class="stitle">Challenges</div>`;allCh.forEach(ch=>{h+=renderChallenge(ch,!ch.closed);});}
  if(sk.length>0){
    h+=`<div class="stitle">Hall of fame — all games</div><div class="hofg">`;
    sk.forEach(([n,w],i)=>{h+=`<div class="hofc"><div class="rnk">${md[i]||'#'+(i+1)}</div><div class="nm">${n}</div><div class="wn">${w}</div><div class="lb">${w===1?'win':'wins'}</div></div>`;});
    h+=`</div>`;
  }
  if(H.length===0){h+=`<div class="empty">No games yet — play your first game!</div>`;}
  else{
    h+=`<div class="stitle">Past games</div>`;
    H.forEach(g=>{
      const ps=[...g.players].sort((a,b)=>a.total-b.total);
      const ch=g.challengeId?challenges.find(c=>c.id===g.challengeId):null;
      h+=`<div class="grec"><div class="grh">
        <span class="grd">${fd(g.date)}${g.firstDealer?' · First dealer: '+g.firstDealer:''}${ch?` · <span style="color:var(--amethyst);font-weight:600">💎 ${ch.name}</span>`:''}</span>
        <span class="grw">🏆 ${g.winner}</span>
      </div><div class="ptags">`;
      ps.forEach(p=>{h+=`<span class="ptag ${p.name===g.winner?'w':''}">${p.name}: ${p.total}</span>`;});
      h+=`</div></div>`;
    });
  }
  if(!S.active)h+=`<button class="btn" style="max-width:480px;margin-top:1rem" onclick="sh('ss')">New game</button>`;
  cont.innerHTML=h;
}

window.abandonGame=function(){
  if(!confirm('Abandon this game? Scores will not be saved.'))return;
  if(unsubGame){unsubGame();unsubGame=null;}
  S={players:[],scores:{},cur:1,date:'',active:false,fdIdx:0,challengeId:null,gameCode:null};
  isHost=false;
  sh('ss');
  renderChallengeOpts();
};

window.leaveGame=function(){
  if(unsubGame){unsubGame();unsubGame=null;}
  S={players:[],scores:{},cur:1,date:'',active:false,fdIdx:0,challengeId:null,gameCode:null};
  isHost=false;
  sh('ss');
};
</script>
</body>
</html>
